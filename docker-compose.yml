# =============================================================================
# Allmart — Docker Compose
# Levanta backend, frontend y PostgreSQL con un solo comando.
#
# Uso:
#   docker compose up              (modo interactivo, ver logs)
#   docker compose up -d           (modo background/detached)
#   docker compose down            (detener y limpiar contenedores)
#   docker compose down -v         (detener y eliminar volúmenes de datos)
#
# Requisitos:
#   - Docker Desktop (Windows/Mac) o Docker Engine + Compose plugin (Linux)
#   - Archivo .env en la raíz del proyecto (copiar de .env.docker.example)
# =============================================================================

services:
  # ─── Base de datos PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: allmart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - allmart-network

  # ─── Backend (Node.js + Express + TypeScript) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allmart-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - allmart-network

  # ─── Frontend (React + Vite servido con nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: allmart-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - allmart-network

# ─── Volúmenes persistentes ─────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ─── Red interna ────────────────────────────────────────────────────────────
networks:
  allmart-network:
    driver: bridge
