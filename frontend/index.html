<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- favicon files generated via favicon.io or similar; replace with actual images -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Allmart — Una forma práctica de disfrutar tu hogar. Productos de bazar, decoración y hogar." />
    <meta name="theme-color" content="#769282" /> <!-- color used by task bars / UI when installing PWA -->
    
    <!-- 🟢 FIX LCP: Preconectar a los CDNs de imágenes para ahorrar ~300ms de latencia -->
    <link rel="preconnect" href="https://pub-9df94833d53d4e3eae698edbc8afa7f9.r2.dev" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- 🟢 FIX RENDERING: Carga asíncrona no bloqueante de Google Fonts -->
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" 
      as="style" 
      onload="this.onload=null;this.rel='stylesheet'" 
    />
    <noscript>
      <link 
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" 
        rel="stylesheet" 
      />
    </noscript>

    <!-- 🟢 FIX LCP: Iniciar fetch de banners de inmediato y precargar la imagen LCP dinámicamente -->
    <script>
      (function() {
        try {
          window.__bannersPromise = fetch('/api/banners')
            .then(function(res) { return res.json(); })
            .then(function(body) {
              try {
                if (body && body.success && body.data && body.data.length > 0) {
                  var firstBanner = body.data[0];
                  var url = firstBanner.imageUrl;
                  if (url) {
                    var link = document.createElement('link');
                    link.rel = 'preload';
                    link.as = 'image';
                    link.href = url;
                    link.imageSizes = '(max-width: 768px) 100vw, 1200px';
                    link.setAttribute('fetchpriority', 'high');
                    document.head.appendChild(link);
                  }
                }
              } catch (e) {
                console.error('Error preloading banner image:', e);
              }
              return body;
            })
            .catch(function() { return null; });
        } catch(e) {}
      })();
    </script>

    <title>Allmart — Tu hogar, más práctico</title>
    <!-- Dark mode FOUC prevention: apply stored theme before paint only on Admin routes -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('admin-theme');
          if (t === 'dark' && window.location.pathname.startsWith('/admin')) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
