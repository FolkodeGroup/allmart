<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Allmart — Una forma práctica de disfrutar tu hogar. Productos de bazar, decoración y hogar." />
    <meta name="theme-color" content="#769282" />
    
    <!-- 🟢 PRECONEXIÓN DIRECTA: CDN de Cloudflare R2 con resolución ultra-rápida -->
    <link rel="preconnect" href="https://imagenes.allmartbazar.com.ar" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 🟢 FIX LCP CRÍTICO: Precarga estática directa del primer banner para que Lighthouse lo descubra de inmediato en el HTML puro -->
    <link 
      rel="preload" 
      as="image" 
      href="https://imagenes.allmartbazar.com.ar/banners/019f47c2-c87c-7422-8938-b27e03de41f6/full.webp" 
      imagesizes="(max-width: 768px) 100vw, 1600px" 
      fetchpriority="high" 
    />
    
    <!-- 🟢 FIX RENDERING: Carga asíncrona no bloqueante de Google Fonts -->
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" 
      as="style" 
      onload="this.onload=null;this.rel='stylesheet'" 
    />
    <noscript>
      <link 
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" 
        rel="stylesheet" 
      />
    </noscript>

    <title>Allmart — Tu hogar, más práctico</title>
    
    <!-- Dark mode FOUC prevention -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('admin-theme');
          if (t === 'dark' && window.location.pathname.startsWith('/admin')) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
