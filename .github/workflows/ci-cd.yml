# =============================================================================
# Allmart — Pipeline CI/CD
#
# Flujo:
#   1. Escaneo de seguridad con GitGuardian (todos los pushes/PRs)
#   2. Build y test del código (todos los pushes/PRs)
#   3. Build y push de imágenes Docker a DockerHub (solo push a main)
#   4. Despliegue automático en VPS DonWeb (solo push a main)
#
# Secrets requeridos en GitHub (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_TOKEN         Token de acceso de DockerHub
#   - VPS_SSH_KEY             Clave privada SSH para acceder al VPS
#   - VPS_DB_USER             Usuario de base de datos en producción
#   - VPS_DB_PASSWORD         Contraseña de base de datos en producción
#   - VPS_DB_NAME             Nombre de la base de datos en producción
#   - VPS_JWT_SECRET          JWT secret para producción (mínimo 64 chars)
#   - VPS_CORS_ORIGIN         URL del frontend en el VPS (ej: http://IP:8082)
#   - VPS_SEED_ADMIN_PASSWORD Contraseña inicial para el usuario admin@admin.com
#   - VPS_SEED_EDITOR_PASSWORD Contraseña inicial para el usuario editor@admin.com
#   - GITGUARDIAN_API_KEY     API key de GitGuardian para escaneo de secretos
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOCKERHUB_USERNAME: dgimenezdeveloper
  BACKEND_IMAGE: dgimenezdeveloper/allmart-backend
  FRONTEND_IMAGE: dgimenezdeveloper/allmart-frontend
  VPS_HOST: "168.197.49.120"
  VPS_PORT: "5371"
  VPS_USER: root
  DEPLOY_DIR: /opt/allmart

jobs:
  # ─── Job 1: Escaneo de seguridad con GitGuardian ──────────────────────────────
  security-scan:
    name: "GitGuardian Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Escanear secretos con GitGuardian
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # ─── Job 2: Build y Test ──────────────────────────────────────────────────────
  build-and-test:
    name: "Build & Test"
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Instalar dependencias frontend
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Instalar dependencias backend
        run: cd backend && npm ci

      - name: Build backend
        run: cd backend && npm run build || echo "Build no configurado"

  # ─── Job 3: Build y Push de imágenes Docker a DockerHub ──────────────────────
  docker-build-push:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generar tag de imagen
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build y Push imagen Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y Push imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Despliegue en VPS DonWeb ──────────────────────────────────────────
  deploy:
    name: "Deploy to VPS (DonWeb)"
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Copiar archivos de configuración al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          port: ${{ env.VPS_PORT }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,docker/,scripts/deploy-vps.sh"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 0

      - name: Configurar .env y desplegar en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          port: ${{ env.VPS_PORT }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}

            echo "Sincronizando .env de produccion..."
            
            # 1. Asegurar que .env exista
            touch .env

            # 2. Función robusa para actualizar .env sin problemas de caracteres especiales
            update_env() {
              key=$1
              value=$2
              # Eliminar la línea si ya existe y añadirla limpia
              grep -v "^${key}=" .env > .env.tmp || true
              echo "${key}=${value}" >> .env.tmp
              mv .env.tmp .env
            }

            # 3. Actualizar variables críticas base
            update_env "IMAGE_TAG" "${{ needs.docker-build-push.outputs.image_tag }}"
            update_env "DB_USER" "${{ secrets.VPS_DB_USER }}"
            update_env "DB_PASSWORD" "${{ secrets.VPS_DB_PASSWORD }}"
            update_env "DB_NAME" "${{ secrets.VPS_DB_NAME }}"
            update_env "DB_PORT_HOST" "5434"
            update_env "NODE_ENV" "production"
            update_env "BACKEND_PORT" "3002"
            update_env "FRONTEND_PORT" "8082"
            update_env "JWT_SECRET" "${{ secrets.VPS_JWT_SECRET }}"
            update_env "CORS_ORIGIN" "${{ secrets.VPS_CORS_ORIGIN }}"
            
            # Solo actualizar seed passwords si el secret NO está vacío en GitHub
            if [ -n "${{ secrets.VPS_SEED_ADMIN_PASSWORD }}" ]; then
              update_env "SEED_ADMIN_PASSWORD" "${{ secrets.VPS_SEED_ADMIN_PASSWORD }}"
            fi
            if [ -n "${{ secrets.VPS_SEED_EDITOR_PASSWORD }}" ]; then
              update_env "SEED_EDITOR_PASSWORD" "${{ secrets.VPS_SEED_EDITOR_PASSWORD }}"
            fi

            # Construir DATABASE_URL dinámicamente si falta
            DB_USER_VAL=$(grep "^DB_USER=" .env | cut -d'=' -f2-)
            DB_PASS_VAL=$(grep "^DB_PASSWORD=" .env | cut -d'=' -f2-)
            DB_NAME_VAL=$(grep "^DB_NAME=" .env | cut -d'=' -f2-)
            update_env "DATABASE_URL" "postgresql://${DB_USER_VAL}:${DB_PASS_VAL}@db:5432/${DB_NAME_VAL}?schema=public"

            echo "Descargando imagenes actualizadas..."
            docker pull ${{ env.BACKEND_IMAGE }}:${{ needs.docker-build-push.outputs.image_tag }}
            docker pull ${{ env.FRONTEND_IMAGE }}:${{ needs.docker-build-push.outputs.image_tag }}

            echo "Reiniciando contenedores..."
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d

            echo "Estado final:"
            docker compose -f docker-compose.prod.yml ps

            echo "Limpiando imagenes no utilizadas..."
            docker image prune -f --filter "until=24h" || true

            echo "Despliegue completado exitosamente"
