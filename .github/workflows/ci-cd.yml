# =============================================================================
# Allmart — Pipeline CI/CD
#
# Flujo:
#   1. Escaneo de seguridad con GitGuardian (opcional, no bloquea pipeline)
#   2. Build y test del código
#   3. Build y push de imágenes Docker a DockerHub (solo push a main)
#   4. Despliegue automático en VPS DonWeb (solo push a main)
#
# Secrets requeridos en GitHub (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_TOKEN         Token de acceso de DockerHub
#   - VPS_SSH_KEY             Clave privada SSH para acceder al VPS
#   - VPS_DB_USER             Usuario de base de datos en producción
#   - VPS_DB_PASSWORD         Contraseña de base de datos en producción
#   - VPS_DB_NAME             Nombre de la base de datos en producción
#   - VPS_JWT_SECRET          JWT secret para producción (mínimo 64 chars)
#   - VPS_CORS_ORIGIN         URL del frontend en el VPS
#   - GITGUARDIAN_API_KEY     API key de GitGuardian (opcional)
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOCKERHUB_USERNAME: dgimenezdeveloper
  BACKEND_IMAGE: dgimenezdeveloper/allmart-backend
  FRONTEND_IMAGE: dgimenezdeveloper/allmart-frontend
  VPS_HOST: "168.197.49.120"
  VPS_PORT: "5371"
  VPS_USER: root
  DEPLOY_DIR: /opt/allmart

jobs:
  # ─── Job 1: Escaneo de seguridad con GitGuardian (no bloquea el pipeline) ────
  security-scan:
    name: "GitGuardian Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Escanear secretos con GitGuardian
        uses: GitGuardian/ggshield-action@v1
        continue-on-error: true
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # ─── Job 2: Build y Test ──────────────────────────────────────────────────────
  build-and-test:
    name: "Build & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Instalar dependencias frontend
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Instalar dependencias backend
        run: cd backend && npm ci

      - name: Build backend
        run: cd backend && npm run build || echo "Build no configurado"

  # ─── Job 3: Build y Push de imágenes Docker a DockerHub ──────────────────────
  docker-build-push:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generar tag de imagen
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build y Push imagen Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y Push imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            VITE_API_URL=http://${{ env.VPS_HOST }}:3002
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Despliegue en VPS DonWeb ──────────────────────────────────────────
  deploy:
    name: "Deploy to VPS (DonWeb)"
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Copiar archivos de configuración al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          port: ${{ env.VPS_PORT }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,docker/,scripts/deploy-vps.sh"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 0

      - name: Configurar .env y desplegar en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          port: ${{ env.VPS_PORT }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}

            echo "Escribiendo .env de produccion..."
            cat > .env << EOF
            IMAGE_TAG=${{ needs.docker-build-push.outputs.image_tag }}
            DB_USER=${{ secrets.VPS_DB_USER }}
            DB_PASSWORD=${{ secrets.VPS_DB_PASSWORD }}
            DB_NAME=${{ secrets.VPS_DB_NAME }}
            DB_PORT_HOST=5440
            NODE_ENV=production
            BACKEND_PORT=3002
            FRONTEND_PORT=8082
            JWT_SECRET=${{ secrets.VPS_JWT_SECRET }}
            CORS_ORIGIN=${{ secrets.VPS_CORS_ORIGIN }}
            DATABASE_URL=postgresql://${{ secrets.VPS_DB_USER }}:${{ secrets.VPS_DB_PASSWORD }}@db:5432/${{ secrets.VPS_DB_NAME }}?schema=public
            EOF

            echo "Descargando imagenes actualizadas..."
            docker pull ${{ env.BACKEND_IMAGE }}:${{ needs.docker-build-push.outputs.image_tag }}
            docker pull ${{ env.FRONTEND_IMAGE }}:${{ needs.docker-build-push.outputs.image_tag }}

            echo "Reiniciando contenedores..."
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d

            echo "Estado final:"
            docker compose -f docker-compose.prod.yml ps

            echo "Limpiando imagenes no utilizadas..."
            docker image prune -f --filter "until=24h" || true

            echo "Despliegue completado exitosamente"
