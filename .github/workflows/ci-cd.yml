# =============================================================================
# Allmart — Pipeline CI/CD
#
# Flujo:
#   1. Escaneo de seguridad con GitGuardian (todos los pushes/PRs)
#   2. Build y test del código (todos los pushes/PRs)
#   3. Build y push de imágenes Docker a DockerHub (solo push a main)
#   4. Despliegue automático en VPS DonWeb (solo push a main)
#
# Secrets requeridos en GitHub (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_TOKEN         Token de acceso de DockerHub
#   - VPS_SSH_KEY             Clave privada SSH para acceder al VPS
#   - VPS_DB_USER             Usuario de base de datos en producción
#   - VPS_DB_PASSWORD         Contraseña de base de datos en producción
#   - VPS_DB_NAME             Nombre de la base de datos en producción
#   - VPS_JWT_SECRET          JWT secret para producción (mínimo 64 chars)
#   - VPS_CORS_ORIGIN         URL del frontend en el VPS (ej: http://IP:8082)
#   - VPS_SEED_ADMIN_PASSWORD Contraseña inicial para el usuario admin@admin.com
#   - VPS_SEED_EDITOR_PASSWORD Contraseña inicial para el usuario editor@admin.com
#   - GITGUARDIAN_API_KEY     API key de GitGuardian para escaneo de secretos
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOCKERHUB_USERNAME: dgimenezdeveloper
  BACKEND_IMAGE: dgimenezdeveloper/allmart-backend
  FRONTEND_IMAGE: dgimenezdeveloper/allmart-frontend
  VPS_HOST: "168.197.49.120"
  VPS_PORT: "5371"
  VPS_USER: root
  DEPLOY_DIR: /opt/allmart

jobs:
  # ─── Job 1: Escaneo de seguridad con GitGuardian ──────────────────────────────
  security-scan:
    name: "GitGuardian Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Escanear secretos con GitGuardian
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # ─── Job 2: Build y Test ──────────────────────────────────────────────────────
  build-and-test:
    name: "Build & Test"
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Instalar dependencias frontend
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Instalar dependencias backend
        run: cd backend && npm ci

      - name: Generar cliente Prisma backend
        run: cd backend && npx prisma generate

      - name: Build backend
        run: cd backend && npm run build || echo "Build no configurado"

  # ─── Job 3: Build y Push de imágenes Docker a DockerHub ──────────────────────
  docker-build-push:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generar tag de imagen
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build y Push imagen Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y Push imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Despliegue en VPS DonWeb ──────────────────────────────────────────
  deploy:
    name: "Deploy to VPS (DonWeb)"
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copiar archivos de configuración al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          port: ${{ env.VPS_PORT }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,docker/,scripts/deploy-vps.sh"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 0

      - name: Configurar .env y desplegar en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          port: ${{ env.VPS_PORT }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            cd ${{ env.DEPLOY_DIR }}

            on_error() {
              echo "ERROR: el despliegue falló. Estado y logs de diagnóstico:"
              docker compose -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.prod.yml logs --tail=200 db backend frontend || true
            }
            trap on_error ERR

            echo "Sincronizando .env de produccion..."
            
            # 1. Asegurar que .env exista
            touch .env

            # 2. Función robusta para actualizar .env sin romper valores con saltos de línea
            update_env() {
              key=$1
              value=$(printf '%s' "$2" | tr -d '\r' | tr '\n' ' ' | sed 's/[[:space:]]*$//')
              # Eliminar la línea si ya existe y añadirla limpia
              grep -v "^${key}=" .env > .env.tmp || true
              printf '%s\n' "${key}=${value}" >> .env.tmp
              mv .env.tmp .env
            }

            # 3. Actualizar variables críticas base
            update_env "IMAGE_TAG" "${{ needs.docker-build-push.outputs.image_tag }}"
            update_env "DB_USER" "${{ secrets.VPS_DB_USER }}"
            update_env "DB_PASSWORD" "${{ secrets.VPS_DB_PASSWORD }}"
            update_env "DB_NAME" "${{ secrets.VPS_DB_NAME }}"
            update_env "DB_PORT_HOST" "5434"
            update_env "NODE_ENV" "production"
            update_env "BACKEND_PORT" "3002"
            update_env "FRONTEND_PORT" "8082"
            update_env "JWT_SECRET" "${{ secrets.VPS_JWT_SECRET }}"
            update_env "CORS_ORIGIN" "${{ secrets.VPS_CORS_ORIGIN }}"
            
            # Solo actualizar seed passwords si el secret NO está vacío en GitHub
            SEED_ADMIN="${{ secrets.VPS_SEED_ADMIN_PASSWORD }}"
            SEED_EDITOR="${{ secrets.VPS_SEED_EDITOR_PASSWORD }}"
            if [ -n "$SEED_ADMIN" ]; then
              update_env "SEED_ADMIN_PASSWORD" "$SEED_ADMIN"
            fi
            if [ -n "$SEED_EDITOR" ]; then
              update_env "SEED_EDITOR_PASSWORD" "$SEED_EDITOR"
            fi

            # Garantizar que SEED passwords existan en .env (fallback si secrets están vacíos)
            if ! grep -q "^SEED_ADMIN_PASSWORD=." .env; then
              echo "WARN: SEED_ADMIN_PASSWORD vacío. Configurando valor por defecto."
              update_env "SEED_ADMIN_PASSWORD" "Admin2026!"
            fi
            if ! grep -q "^SEED_EDITOR_PASSWORD=." .env; then
              echo "WARN: SEED_EDITOR_PASSWORD vacío. Configurando valor por defecto."
              update_env "SEED_EDITOR_PASSWORD" "Editor2026!"
            fi

            # No construir DATABASE_URL en host VPS: backend usa DB_* directamente via Prisma adapter

            echo "Descargando imagenes actualizadas..."
            docker pull ${{ env.BACKEND_IMAGE }}:${{ needs.docker-build-push.outputs.image_tag }}
            docker pull ${{ env.FRONTEND_IMAGE }}:${{ needs.docker-build-push.outputs.image_tag }}

            # ─── Backup de la BD antes de tocar contenedores ─────────────────
            echo "Haciendo backup de la BD antes del deploy..."
            BACKUP_DIR="/opt/allmart/backups"
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
            mkdir -p "$BACKUP_DIR"
            if docker ps --format '{{.Names}}' | grep -q '^allmart-prod-db$'; then
              DB_USER_VAL=$(grep '^DB_USER=' .env | cut -d= -f2 | tr -d '"')
              DB_NAME_VAL=$(grep '^DB_NAME=' .env | cut -d= -f2 | tr -d '"')
              docker exec allmart-prod-db pg_dump -U "$DB_USER_VAL" "$DB_NAME_VAL" | gzip > "$BACKUP_FILE" && \
                echo "Backup guardado: $BACKUP_FILE" || \
                echo "WARN: No se pudo hacer backup (primer deploy o BD no disponible)"
              # Mantener solo los últimos 10 backups
              ls -t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | tail -n +11 | xargs rm -f || true
            else
              echo "INFO: Contenedor DB no corriendo — saltando backup (primer deploy)"
            fi

            echo "Limpiando contenedores y redes huérfanos..."
            # ⚠️  Solo eliminar backend y frontend, NUNCA la DB con -f (el volumen persiste igual)
            if docker ps -a --format '{{.Names}}' | grep -q '^allmart-prod-backend$'; then
              docker rm -f allmart-prod-backend 2>/dev/null || true
            fi
            if docker ps -a --format '{{.Names}}' | grep -q '^allmart-prod-frontend$'; then
              docker rm -f allmart-prod-frontend 2>/dev/null || true
            fi
            # Eliminar red si existe
            if docker network ls --format '{{.Name}}' | grep -q '^allmart_allmart-prod-network$'; then
              docker network rm allmart_allmart-prod-network 2>/dev/null || true
            fi

            echo "Reiniciando contenedores..."
            # ⚠️  NUNCA usar -v aquí: destruiría el volumen allmart_pgdata y se perderían todos los datos
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --wait --wait-timeout 240

            echo "Estado final:"
            docker compose -f docker-compose.prod.yml ps

            echo "Limpiando imagenes no utilizadas..."
            docker image prune -f --filter "until=24h" || true

            echo "Despliegue completado exitosamente"
