name: Recordatorio semanal — Actualizar SCORES.md

on:
  # Cada domingo a las 12:00 UTC (09:00 Argentina / 10:00 Argentina verano)
  schedule:
    - cron: '0 12 * * 0'
  # También permite ejecutarlo manualmente desde la UI de GitHub Actions
  workflow_dispatch:

jobs:
  recordatorio:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar si SCORES.md fue actualizado esta semana
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            // Obtener los últimos commits que tocaron SCORES.md
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'frontend/SCORES.md',
              per_page: 1,
            });

            const ahora = new Date();
            const haceUnaSemana = new Date(ahora.getTime() - 7 * 24 * 60 * 60 * 1000);

            let necesitaActualizacion = true;
            let ultimaActualizacion = 'nunca';

            if (commits.length > 0) {
              const fechaUltimoCommit = new Date(commits[0].commit.committer.date);
              ultimaActualizacion = fechaUltimoCommit.toISOString().split('T')[0];
              if (fechaUltimoCommit > haceUnaSemana) {
                necesitaActualizacion = false;
              }
            }

            core.setOutput('necesita_actualizacion', necesitaActualizacion ? 'true' : 'false');
            core.setOutput('ultima_actualizacion', ultimaActualizacion);
            console.log(`SCORES.md última actualización: ${ultimaActualizacion}`);
            console.log(`¿Necesita actualización?: ${necesitaActualizacion}`);

      - name: Verificar si ya existe un recordatorio abierto esta semana
        id: check_issue
        if: steps.check.outputs.necesita_actualizacion == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'recordatorio-puntajes',
              per_page: 5,
            });

            const yaExiste = issues.length > 0;
            core.setOutput('ya_existe', yaExiste ? 'true' : 'false');
            console.log(`¿Ya existe recordatorio abierto?: ${yaExiste}`);

      - name: Crear issue de recordatorio
        if: |
          steps.check.outputs.necesita_actualizacion == 'true' &&
          steps.check_issue.outputs.ya_existe == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const hoy = new Date().toISOString().split('T')[0];
            const ultimaAct = '${{ steps.check.outputs.ultima_actualizacion }}';

            // Crear la etiqueta si no existe
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'recordatorio-puntajes',
                color: 'f9d71c',
                description: 'Recordatorio automático para actualizar SCORES.md',
              });
            } catch (e) {
              // La etiqueta ya existe, no es un error
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 [Recordatorio dominical] Actualizar SCORES.md — ${hoy}`,
              labels: ['recordatorio-puntajes'],
              assignees: ['dgimenezdeveloper'],
              body: `## Recordatorio semanal de puntajes

            Hola @dgimenezdeveloper 👋

            **SCORES.md** no fue actualizado en los últimos 7 días.
            Última actualización registrada: \`${ultimaAct}\`

            ### Pasos para actualizar:

            1. Asegúrate de tener el \`.env\` con tu \`GITHUB_TOKEN\` en \`frontend/.env\`
            2. Ejecutá el script desde la raíz del frontend:
               \`\`\`bash
               cd frontend
               node scripts/sumar_puntajes.cjs
               \`\`\`
            3. Revisá el \`SCORES.md\` generado y commiteá los cambios:
               \`\`\`bash
               git add frontend/SCORES.md MANAGEMENT_LOG.md
               git commit -m "chore: actualizar puntajes semanales [skip ci]"
               git push
               \`\`\`
            4. Cerrá este issue una vez que el archivo esté actualizado.

            ### ¿Quién recibe puntajes esta semana?
            Revisá también el archivo [MANAGEMENT_LOG.md](../blob/main/MANAGEMENT_LOG.md) para ver las actividades de gestión pendientes de consolidar.

            ---
            *Este issue fue creado automáticamente por el workflow **Recordatorio semanal**.*`,
            });

            console.log('✅ Issue de recordatorio creado y asignado a dgimenezdeveloper');

      - name: Sin acción necesaria
        if: steps.check.outputs.necesita_actualizacion == 'false'
        run: |
          echo "✅ SCORES.md fue actualizado recientemente (última actualización: ${{ steps.check.outputs.ultima_actualizacion }}). No se requiere acción."
